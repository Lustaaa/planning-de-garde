<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Planning de garde</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="PlanningDeGarde.Web.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- Amorce du thème « Cocon élevé » (sprint 26, Sc.2/Sc.3) : posée en <head>, AVANT le rendu du
         <body> et de Blazor → zéro flash. Priorité : choix explicite persisté (localStorage) puis
         préférence système (prefers-color-scheme). data-theme sur <html> pilote les tokens --pdg-*. -->
    <script>
        (function () {
            try {
                var choix = localStorage.getItem('pdg-theme');
                var systemeSombre = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = (choix === 'clair' || choix === 'sombre') ? choix : (systemeSombre ? 'sombre' : 'clair');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'clair');
            }
        })();

        // Module de bascule du thème (Sc.3), consommé par le switch Blazor via JS interop.
        // definir : persiste le choix explicite (prioritaire au chargement suivant, l'amorce lit
        // localStorage en premier) ET l'applique immédiatement, sans rechargement. lire : thème appliqué.
        window.pdgTheme = {
            lire: function () {
                return document.documentElement.getAttribute('data-theme') || 'clair';
            },
            definir: function (theme) {
                try { localStorage.setItem('pdg-theme', theme); } catch (e) { }
                document.documentElement.setAttribute('data-theme', theme);
            }
        };

        // Module de persistance de session (s31, Sc.1), consommé par le port IPersistanceSession via JS interop.
        // Le jeton d'identité du compte connecté est écrit dans localStorage['pdg-session'] : ce stockage,
        // hors mémoire du runtime WASM, SURVIT au rechargement (F5) — au démarrage suivant, l'app le relit et
        // restaure la session sans repasser par /connexion. Contenu = identité déjà résolue serveur, aucun secret.
        window.pdgSession = {
            persister: function (jetonJson) {
                try { localStorage.setItem('pdg-session', jetonJson); } catch (e) { }
            },
            lire: function () {
                try { return localStorage.getItem('pdg-session'); } catch (e) { return null; }
            },
            purger: function () {
                try { localStorage.removeItem('pdg-session'); } catch (e) { }
            }
        };

        // Module d'écoute Échap des modals de la Config foyer (finition PO s33), consommé par le port
        // IEcouteurEchapModal via JS interop. La capture est au niveau DOCUMENT (jamais un div à focus :
        // en navigateur réel le keydown part de document et n'atteint pas une modal non focus). attacher :
        // pose un document.addEventListener('keydown') filtrant Échap et rappelle .NET (Declencher →
        // OnFermer = « Annuler » sans mutation) ; renvoie un id opaque. detacher : retire CE listener (par
        // id) — appelé à la fermeture/Dispose de la modal, donc pas de fuite ni de double abonnement.
        window.pdgModal = (function () {
            var registre = new Map();
            var seq = 0;
            return {
                attacher: function (dotNetRef) {
                    var id = ++seq;
                    var handler = function (e) {
                        if (e.key === 'Escape' || e.key === 'Esc') {
                            dotNetRef.invokeMethodAsync('Declencher');
                        }
                    };
                    document.addEventListener('keydown', handler);
                    registre.set(id, handler);
                    return id;
                },
                detacher: function (id) {
                    var handler = registre.get(id);
                    if (handler) {
                        document.removeEventListener('keydown', handler);
                        registre.delete(id);
                    }
                }
            };
        })();

        // Module d'écoute du RELÂCHEMENT du pointeur au niveau DOCUMENT (s49, correctif du gate G3 : le drag
        // multi-jours de la grille ne fonctionnait pas en navigateur réel), consommé par le port
        // IEcouteurRelachementPointeur via JS interop. La capture est au niveau DOCUMENT (jamais un
        // @onmouseup/@onpointerup sur la case seule : relâcher le bouton HORS d'une case — gouttière, au-delà
        // du bord, sur le document — n'atteint pas le handler de la case, et la plage n'est jamais finalisée).
        // attacher : pose un document.addEventListener('pointerup') rappelant .NET (Declencher → FinSelectionPlage,
        // qui n'agit que si une sélection est armée) et renvoie un id opaque. detacher : retire CE listener (par id).
        window.pdgPointeur = (function () {
            var registre = new Map();
            var seq = 0;

            // CEINTURE anti-sélection-native (s49, 2ᵉ passe du gate G3) : même quand user-select:none est
            // posé en CSS, les événements SOURIS de compatibilité déclenchés pendant un geste de POINTEUR
            // peuvent encore démarrer une sélection de texte / un drag natif sur les cases de la grille
            // (le texte se surligne en bleu, les pointerover/pointerup intermédiaires sont avalés et le
            // drag de plage ne s'installe pas). On empêche donc DÉFINITIVEMENT le démarrage de sélection
            // (selectstart) et le drag natif (dragstart) — MAIS UNIQUEMENT lorsque l'événement part d'une
            // surface de grille ([data-testid="grille-agenda"]) : la sélection de texte reste normale
            // partout ailleurs (copier un libellé, une notification…). Attaché une seule fois au niveau
            // document (le geste peut sortir d'une case), jamais retiré (coût nul hors grille).
            var empecherSelectionSurGrille = function (e) {
                var cible = e.target;
                if (cible && cible.closest && cible.closest('[data-testid="grille-agenda"]')) {
                    e.preventDefault();
                }
            };
            document.addEventListener('selectstart', empecherSelectionSurGrille);
            document.addEventListener('dragstart', empecherSelectionSurGrille);

            // Résolution de la case sous un point écran (s49, 2ᵉ correctif du gate G3 : le drag ne surlignait
            // AUCUNE case intermédiaire en navigateur réel). Le survol NE PEUT PAS reposer sur les
            // @onpointerover posés par case : pendant un glisser souris ils sont fragiles / manqués, et la
            // moindre capture de pointeur les court-circuiterait. On résout donc la case sous le curseur au
            // niveau DOCUMENT : document.elementFromPoint(x, y) → plus proche [data-testid="jour-case"] →
            // lit son identifiant de jour (data-date). Renvoie null hors d'une case (gouttière, bord, dehors).
            var dateCaseSousPoint = function (x, y) {
                var el = document.elementFromPoint(x, y);
                var caseJour = el && el.closest ? el.closest('[data-testid="jour-case"]') : null;
                return caseJour ? caseJour.getAttribute('data-date') : null;
            };

            return {
                attacher: function (dotNetRef) {
                    var id = ++seq;
                    var handler = function () {
                        dotNetRef.invokeMethodAsync('Declencher');
                    };
                    document.addEventListener('pointerup', handler);
                    registre.set(id, handler);
                    return id;
                },
                detacher: function (id) {
                    var handler = registre.get(id);
                    if (handler) {
                        document.removeEventListener('pointerup', handler);
                        registre.delete(id);
                    }
                },
                // Écoute du MOUVEMENT du pointeur au niveau DOCUMENT (s49) : à chaque déplacement BOUTON APPUYÉ
                // (e.buttons & 1 — un simple survol sans bouton ne compte pas, aucune inondation d'interop hors
                // geste), résout la case sous le curseur (elementFromPoint) et remonte son data-date au .NET
                // (Survoler(date), date=null hors case). C'est LA voie fiable du drag continu — indépendante des
                // @onpointerover par case et de toute capture de pointeur. Attaché au document (le geste sort des cases).
                attacherMouvement: function (dotNetRef) {
                    var id = ++seq;
                    var handler = function (e) {
                        if (!(e.buttons & 1)) return; // seul un glisser bouton primaire appuyé arme le survol
                        dotNetRef.invokeMethodAsync('Survoler', dateCaseSousPoint(e.clientX, e.clientY));
                    };
                    document.addEventListener('pointermove', handler);
                    registre.set(id, handler);
                    return id;
                },
                detacherMouvement: function (id) {
                    var handler = registre.get(id);
                    if (handler) {
                        document.removeEventListener('pointermove', handler);
                        registre.delete(id);
                    }
                }
            };
        })();
    </script>
</head>

<body>
    <div id="app">
        <div style="padding:2rem;font-family:sans-serif;color:#555;">Chargement du planning…</div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        Une erreur est survenue.
        <a href="." class="reload">Recharger</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
